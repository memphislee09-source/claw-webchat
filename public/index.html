<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>openclaw-webchat</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b1020;
        color: #e6edf3;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #18213f 0%, #0b1020 60%);
      }
      main {
        width: min(720px, calc(100vw - 32px));
        padding: 32px;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 20px;
        background: rgba(11, 16, 32, 0.82);
        box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      }
      h1 { margin-top: 0; font-size: 28px; }
      p { line-height: 1.6; color: #b6c2d0; }
      code {
        padding: 2px 6px;
        border-radius: 6px;
        background: rgba(255,255,255,0.08);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>openclaw-webchat</h1>
      <p>Phase 1 服务端已接入独立命名空间、会话绑定与本地历史存储。前端 MVP 正在继续实现中。</p>
      <p>健康检查：<code>/healthz</code></p>
    </main>
  </body>
</html>
